name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/YOUR_USERNAME/YOUR_USERNAME.github.io.git deploy

          rm -rf deploy/*
          cp -r dist/* deploy/

          cd deploy
          git add .
          git commit -m "Auto deploy"
          git push
